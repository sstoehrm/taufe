<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baptism</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=Quicksand:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --c-peach: #ffb89a;
        --c-coral: #ff8fa3;
        --c-lavender: #b8a4e3;
        --c-sky: #9dd0ff;
        --c-mint: #9be8c8;
        --c-butter: #ffe08a;
        --ink: #3d2459;
        --ink-soft: #6a4f8c;
        --card: #ffffff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: "Quicksand", system-ui, sans-serif;
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 2rem 1.5rem;
        position: relative;
        background: #fff8f0;
        background-image:
          radial-gradient(at 12% 18%, var(--c-peach) 0px, transparent 45%),
          radial-gradient(at 88% 14%, var(--c-lavender) 0px, transparent 45%),
          radial-gradient(at 78% 88%, var(--c-mint) 0px, transparent 45%),
          radial-gradient(at 18% 82%, var(--c-sky) 0px, transparent 45%),
          radial-gradient(at 50% 50%, var(--c-butter) 0px, transparent 30%);
      }

      #bg-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      main {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.75rem;
        max-width: 360px;
        width: 100%;
        animation: rise 1s cubic-bezier(0.2, 0.7, 0.2, 1) both;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .frame {
        padding: 14px 14px 56px;
        background: var(--card);
        border-radius: 18px;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.9) inset,
          0 30px 50px -24px rgba(80, 40, 100, 0.28),
          0 8px 16px -8px rgba(80, 40, 100, 0.15);
        transform: rotate(-1.5deg);
        transition: transform 0.5s cubic-bezier(0.2, 0.7, 0.2, 1);
      }

      .frame:hover {
        transform: rotate(0deg) scale(1.02);
      }

      .photo {
        width: 260px;
        aspect-ratio: 4 / 5;
        border-radius: 10px;
        background: linear-gradient(
          135deg,
          var(--c-peach) 0%,
          var(--c-coral) 35%,
          var(--c-lavender) 70%,
          var(--c-sky) 100%
        );
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
      }

      .photo::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 30% 25%,
          rgba(255, 255, 255, 0.5) 0%,
          transparent 50%
        );
      }

      .photo span {
        font-family: "Quicksand", sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.85);
        font-weight: 600;
        position: relative;
        z-index: 1;
      }

      .caption {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.6rem;
      }

      .eyebrow {
        font-family: "Fraunces", serif;
        font-style: italic;
        font-weight: 400;
        font-size: 1.05rem;
        color: var(--ink-soft);
      }

      .eyebrow-bottom {
        font-family: "Fraunces", serif;
        font-style: italic;
        font-weight: 200;
        font-size: 0.85rem;
        color: var(--ink-soft);
      }

      .name {
        font-family: "Fraunces", serif;
        font-size: 2.6rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        line-height: 1;
        background: linear-gradient(
          120deg,
          var(--c-coral) 0%,
          var(--c-lavender) 60%,
          var(--c-sky) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        padding: 0.1em 0;
      }

      .meta {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-top: 0.4rem;
        font-size: 0.85rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-soft);
        font-weight: 500;
      }

      .meta::before,
      .meta::after {
        content: "";
        width: 18px;
        height: 1px;
        background: currentColor;
        opacity: 0.5;
      }

      hr {
        border: none;
        border-top: 1px solid #3d2459;
        opacity: 0.5;
        margin: 1rem 0;
        width: 72px;
      }

      @media (max-height: 680px) {
        .photo {
          width: 200px;
        }
        .name {
          font-size: 2.1rem;
        }
        main {
          gap: 1.25rem;
        }
        .frame {
          padding: 10px 10px 40px;
        }
      }
    </style>
  </head>

    <script>
      /* animated background: floating bubbles + twinkling sparkles */
      (() => {
        const canvas = document.getElementById("bg-canvas");
        const ctx = canvas.getContext("2d");
        const palette = [
          "#ffb89a",
          "#ff8fa3",
          "#b8a4e3",
          "#9dd0ff",
          "#9be8c8",
          "#ffe08a",
        ];
        const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

        let w, h, dpr;
        function resize() {
          dpr = Math.min(window.devicePixelRatio || 1, 2);
          w = window.innerWidth;
          h = window.innerHeight;
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        addEventListener("resize", resize);

        const rand = (min, max) => min + Math.random() * (max - min);
        const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

        const bubbleCount = Math.min(28, Math.floor((w * h) / 22000));
        const bubbles = Array.from({ length: bubbleCount }, () => ({
          x: rand(0, w),
          y: rand(0, h),
          r: rand(6, 34),
          speed: rand(0.15, 0.55),
          wobble: rand(0, Math.PI * 2),
          wobbleSpeed: rand(0.004, 0.012),
          wobbleAmp: rand(0.3, 1.2),
          color: pick(palette),
          alpha: rand(0.18, 0.42),
        }));

        const sparkleCount = 14;
        const sparkles = Array.from({ length: sparkleCount }, () => ({
          x: rand(0, w),
          y: rand(0, h),
          size: rand(3, 7),
          phase: rand(0, Math.PI * 2),
          speed: rand(0.015, 0.035),
          color: pick(palette),
          respawnAt: 0,
        }));

        function drawBubble(b) {
          const grad = ctx.createRadialGradient(
            b.x - b.r * 0.35,
            b.y - b.r * 0.35,
            b.r * 0.05,
            b.x,
            b.y,
            b.r,
          );
          grad.addColorStop(0, "rgba(255,255,255," + (b.alpha + 0.3) + ")");
          grad.addColorStop(0.45, b.color);
          grad.addColorStop(1, b.color + "00");
          ctx.globalAlpha = b.alpha;
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fill();

          // crisp highlight
          ctx.globalAlpha = b.alpha * 0.9;
          ctx.fillStyle = "rgba(255,255,255,0.85)";
          ctx.beginPath();
          ctx.arc(
            b.x - b.r * 0.35,
            b.y - b.r * 0.35,
            b.r * 0.18,
            0,
            Math.PI * 2,
          );
          ctx.fill();
        }

        function drawSparkle(s, t) {
          const tw = (Math.sin(s.phase + t * s.speed) + 1) / 2;
          if (tw < 0.05) return;
          ctx.save();
          ctx.globalAlpha = tw * 0.85;
          ctx.translate(s.x, s.y);
          ctx.fillStyle = s.color;
          const a = s.size;
          const b = s.size * 0.22;
          ctx.beginPath();
          ctx.moveTo(0, -a);
          ctx.lineTo(b, -b);
          ctx.lineTo(a, 0);
          ctx.lineTo(b, b);
          ctx.lineTo(0, a);
          ctx.lineTo(-b, b);
          ctx.lineTo(-a, 0);
          ctx.lineTo(-b, -b);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }

        let frame = 0;
        function tick() {
          frame++;
          ctx.clearRect(0, 0, w, h);

          for (const b of bubbles) {
            if (!reduced) {
              b.wobble += b.wobbleSpeed;
              b.y -= b.speed;
              b.x += Math.sin(b.wobble) * b.wobbleAmp * 0.3;
            }
            if (b.y + b.r < -10) {
              b.y = h + b.r + rand(0, 80);
              b.x = rand(0, w);
              b.color = pick(palette);
              b.alpha = rand(0.18, 0.42);
            }
            drawBubble(b);
          }

          ctx.globalAlpha = 1;
          for (const s of sparkles) {
            drawSparkle(s, frame);
            // occasional respawn for variety
            if (!reduced && frame > s.respawnAt && Math.random() < 0.0015) {
              s.x = rand(0, w);
              s.y = rand(0, h);
              s.color = pick(palette);
              s.respawnAt = frame + 600;
            }
          }

          requestAnimationFrame(tick);
        }

        if (reduced) {
          // single static frame
          for (const b of bubbles) drawBubble(b);
          for (const s of sparkles) drawSparkle(s, 0);
        } else {
          tick();
        }
      })();
    </script>
    <script>
      /*
       * Workflow:
       *   1. Open this page in a browser. Open DevTools console.
       *   2. Run: encryptMain("your-secret")
       *   3. Console will print a line like:
       *        <main data-encrypted="...base64..."></main>
       *   4. Replace your <main>...</main> in the HTML with that line.
       *   5. Visitors then need ?token=your-secret in the URL to view it.
       */
      (async () => {
        const enc = new TextEncoder();
        const dec = new TextDecoder();
        const main = document.querySelector("main");

        const b64 = {
          enc: (bytes) => {
            let bin = "";
            const CHUNK = 0x8000; // 32KB at a time, safely under engine arg limits
            for (let i = 0; i < bytes.length; i += CHUNK) {
              bin += String.fromCharCode.apply(
                null,
                bytes.subarray(i, i + CHUNK),
              );
            }
            return btoa(bin);
          },
          dec: (str) => Uint8Array.from(atob(str), (c) => c.charCodeAt(0)),
        };

        async function deriveKey(password, salt) {
          const base = await crypto.subtle.importKey(
            "raw",
            enc.encode(password),
            "PBKDF2",
            false,
            ["deriveKey"],
          );
          return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt, iterations: 250000, hash: "SHA-256" },
            base,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt", "decrypt"],
          );
        }

        window.encryptMain = async function (password) {
          if (!password) {
            console.warn('Usage: encryptMain("your-password")');
            return;
          }
          const plaintext = main.innerHTML;
          const salt = crypto.getRandomValues(new Uint8Array(16));
          const iv = crypto.getRandomValues(new Uint8Array(12));
          const key = await deriveKey(password, salt);
          const ct = new Uint8Array(
            await crypto.subtle.encrypt(
              { name: "AES-GCM", iv },
              key,
              enc.encode(plaintext),
            ),
          );
          const combined = new Uint8Array(salt.length + iv.length + ct.length);
          combined.set(salt, 0);
          combined.set(iv, salt.length);
          combined.set(ct, salt.length + iv.length);
          const blob = b64.enc(combined);
          console.log("--- Encrypted blob ---");
          console.log(blob);
          console.log("--- Replace your <main>...</main> with: ---");
          console.log(`<main data-encrypted="${blob}"></main>`);
          return blob;
        };

        async function decryptMain(password) {
          const blob = main.getAttribute("data-encrypted");
          if (!blob) return;
          try {
            const combined = b64.dec(blob);
            const salt = combined.slice(0, 16);
            const iv = combined.slice(16, 28);
            const ct = combined.slice(28);
            const key = await deriveKey(password, salt);
            const pt = await crypto.subtle.decrypt(
              { name: "AES-GCM", iv },
              key,
              ct,
            );
            main.innerHTML = dec.decode(pt);
            main.removeAttribute("data-encrypted");
          } catch (e) {
            console.warn("Decryption failed: wrong token or corrupted data.");
          }
        }

        const token = new URLSearchParams(location.search).get("token");
        if (token) await decryptMain(token);
      })();
    </script>
